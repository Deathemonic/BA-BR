name: Build

on: [push, workflow_dispatch]

jobs:
  build:
    name: Build for ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    strategy:
      matrix:
        config:
          - { name: win_x64, os: windows-latest, runtime: win-x64 }
          - { name: win_arm64, os: windows-latest, runtime: win-arm64 }
          - { name: linux_x64, os: ubuntu-latest, runtime: linux-x64 }
          - { name: linux_arm64, os: ubuntu-24.04-arm, runtime: linux-arm64 }
          - { name: mac_x64, os: macos-15, runtime: osx-x64 }
          - { name: mac_arm64, os: macos-15, runtime: osx-arm64 }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download FMOD libraries
        shell: bash
        run: |
          curl -L -o fmod.zip "${{ secrets.FMOD }}"
          unzip -o fmod.zip -d BABR.FMOD/Native/

      - name: Publish
        run: dotnet publish BABR.CLI/BABR.CLI.csproj -c Debug -r ${{ matrix.config.runtime }} -o ./publish/${{ matrix.config.runtime }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ matrix.config.runtime }}
          path: publish/${{ matrix.config.runtime }}
